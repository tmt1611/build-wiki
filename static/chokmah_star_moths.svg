<svg width="250" height="150" xmlns="http://www.w3.org/2000/svg" style="background-color: #383838; border-radius: 4px; border: 1px solid #444;">
    <!-- Scribe -->
    <g id="scribe" transform="translate(200, 75)">
        <circle cx="0" cy="0" r="8" fill="#ccc"/>
        <path d="M 0 8 L -4 40 L 4 40 Z" fill="#ccc"/>
    </g>
    <!-- Vision Lines -->
    <path id="vision-lines" d="M 190 75 C 150 75, 110 75, 80 75" fill="none" stroke="#FFA500" stroke-width="2" stroke-dasharray="5 5"/>
    
    <!-- Moths -->
    <g id="moths" fill="#C0C0C0" opacity="0.9">
        <path transform="translate(80, 75) rotate(-15) scale(0.8)" d="M 0,0 l -5,5 l -5,-5 l 2,0 l 3,-3 l 3,3 z"/>
        <path transform="translate(95, 60) rotate(20) scale(1)" d="M 0,0 l -5,5 l -5,-5 l 2,0 l 3,-3 l 3,3 z"/>
        <path transform="translate(90, 90) rotate(10) scale(0.9)" d="M 0,0 l -5,5 l -5,-5 l 2,0 l 3,-3 l 3,3 z"/>
    </g>

    <!-- Scrambled vision -->
    <g id="scramble" stroke="#FFA500" stroke-width="1.5" opacity="0.8">
        <path d="M 80 75 C 70 65, 60 85, 50 75" fill="none" stroke-dasharray="2 2"/>
        <path d="M 95 60 C 85 50, 75 70, 65 60" fill="none" stroke-dasharray="2 2"/>
        <path d="M 90 90 C 80 100, 70 80, 60 90" fill="none" stroke-dasharray="2 2"/>
    </g>
</svg>